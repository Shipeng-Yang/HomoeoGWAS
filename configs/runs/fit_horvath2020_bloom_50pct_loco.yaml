# fit_horvath2020_bloom_50pct_loco.yaml — M3.4 multi-trait Horvath LOCO.
# bloom_50pct = days to 50% bloom (canonical flowering-time trait,
# n_nonnull=297, range 103-124 d). Expected to hit BnaC09.FLC / BnaA10.FT.

fit_version: 1

panel_manifest: ../panels/rapeseed_horvath2020.yaml

panel:
  name: rapeseed_horvath2020
  subgenomes: [A, C]

phenotype:
  path: data/processed/rapeseed/horvath/pheno_clean.tsv
  sample_col: sample
  trait: bloom_50pct

genotype:
  scan_bed_prefix_template: data/processed/rapeseed/horvath/{subgenome}/all
  grm:
    source: bed
    bed_prefix_template: data/processed/rapeseed/horvath/{subgenome}/all
    maf_min: 0.01

kernels:
  normalize: trace
  include_hadamard: false
  hadamard_name: hom

reml:
  n_starts: 10
  seed: 2026

scan:
  mode: auto
  backend: auto
  batch_size: 20000
  maf_min: 0.01
  call_rate_min: 0.9
  loco:
    enabled: true
    fallback: error
    min_denominator_fraction: 1.0e-6

plots:
  enabled: true

outputs:
  out_dir: results/phase3/m3_1_loco_v2/horvath2020/bloom_50pct
  prefix: bloom_50pct
