name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Ruff lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install ruff
      - name: Lint src/ + scripts/ + tests/
        run: ruff check src scripts tests

  tests:
    name: Pytest (CPU smoke, ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          # CPU-only install — GPU optional deps (torch/transformers) skipped in CI smoke
          pip install -e ".[dev]"
      - name: Run unit + integration tests (CPU only)
        run: pytest -m "not gpu and not slow" --maxfail=3
        env:
          PYTHONHASHSEED: "0"

  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    needs: [lint, tests]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install build
        run: pip install build
      - name: Build distributions
        run: python -m build
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: homoeogwas-dist
          path: dist/
