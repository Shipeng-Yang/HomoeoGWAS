# fit_horvath2020_plant_height.yaml — HomoeoGWAS `fit` run-config.
# Development-anchor end-to-end run: Horvath2020 rapeseed (AACC, n=429),
# trait plant_height. ~52k markers -> scan.mode auto resolves to in-memory.
#
#   homoeogwas fit --config configs/runs/fit_horvath2020_plant_height.yaml \
#                  --out-dir results/phase2/cli/horvath2020 --backend cpu

fit_version: 1

# optional: pull panel.subgenomes / panel.name defaults from the frozen
# Phase-1 panel manifest (the manifest itself is never mutated)
panel_manifest: ../panels/rapeseed_horvath2020.yaml

panel:
  name: rapeseed_horvath2020
  subgenomes: [A, C]

phenotype:
  path: data/processed/rapeseed/horvath/pheno_clean.tsv
  sample_col: sample
  trait: plant_height

genotype:
  # PLINK1 BED is the v0.1 execution format
  scan_bed_prefix_template: data/processed/rapeseed/horvath/{subgenome}/all
  grm:
    source: npz                # npz | bed
    npz_path: results/phase2/m2_1/horvath2020/grm_A_C.npz
    npz_key_template: G_{subgenome}
    samples_key: samples
    maf_min: 0.01

kernels:
  normalize: trace             # trace | frobenius
  include_hadamard: false      # additive A+C; set true to add K_hom
  hadamard_name: hom

reml:
  n_starts: 10
  seed: 2026

scan:
  mode: auto                   # auto | memory | stream
  backend: auto                # auto | cpu | gpu
  batch_size: 20000
  maf_min: 0.01
  call_rate_min: 0.9

plots:
  enabled: true

outputs:
  out_dir: results/phase2/cli/horvath2020
  prefix: plant_height
