fit_version: 1
genotype:
  grm:
    bed_prefix_template: data/processed/avena_sativa_logical/{subgenome}/all
    maf_min: 0.01
    source: bed
  scan_bed_prefix_template: data/processed/avena_sativa_logical/{subgenome}/all
kernels:
  hadamard_name: hom
  include_hadamard: false
  normalize: trace
outputs:
  out_dir: results/phase5d/m3_1_loco_v2/oat_old_rahman2025/SOC
  prefix: SOC
panel:
  name: oat_old_rahman2025
  subgenomes:
  - A
  - C
  - D
panel_manifest: ../panels/oat_old_rahman2025.yaml
phenotype:
  path: data/processed/oat/pheno_clean.tsv
  sample_col: sample_id
  trait: SOC
plots:
  enabled: true
reml:
  n_starts: 10
  seed: 2026
scan:
  backend: auto
  batch_size: 20000
  call_rate_min: 0.9
  loco:
    enabled: true
    fallback: error
    min_denominator_fraction: 1.0e-06
  maf_min: 0.01
  mode: auto
