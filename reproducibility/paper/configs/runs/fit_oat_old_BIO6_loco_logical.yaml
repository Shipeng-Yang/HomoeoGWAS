fit_version: 1
panel_manifest: ../panels/oat_old_rahman2025.yaml
panel:
  name: oat_old_rahman2025
  subgenomes:
  - A
  - C
  - D
phenotype:
  path: data/processed/oat/pheno_clean.tsv
  sample_col: sample_id
  trait: BIO6
genotype:
  scan_bed_prefix_template: data/processed/avena_sativa_logical/{subgenome}/all
  grm:
    source: bed
    bed_prefix_template: data/processed/avena_sativa_logical/{subgenome}/all
    maf_min: 0.01
kernels:
  normalize: trace
  include_hadamard: false
  hadamard_name: hom
reml:
  n_starts: 10
  seed: 2026
scan:
  mode: auto
  backend: auto
  batch_size: 20000
  maf_min: 0.01
  call_rate_min: 0.9
  loco:
    enabled: true
    fallback: error
    min_denominator_fraction: 1.0e-06
plots:
  enabled: true
outputs:
  out_dir: results/phase5d/m3_1_loco_v2/oat_old_rahman2025/BIO6
  prefix: BIO6
