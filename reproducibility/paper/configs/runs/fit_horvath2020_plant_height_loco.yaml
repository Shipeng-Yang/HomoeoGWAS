# fit_horvath2020_plant_height_loco.yaml — HomoeoGWAS `fit` run-config.
# Phase 3 M3.1 LOCO variant of fit_horvath2020_plant_height.yaml.
#
# Differences from the EMMAX baseline:
#   • genotype.grm.source = bed (npz cache lacks per-chrom partials)
#   • scan.loco.enabled = true
#   • outputs land under results/phase3/m3_1_loco/horvath2020/
#
# Run:
#   homoeogwas fit --config configs/runs/fit_horvath2020_plant_height_loco.yaml \
#                  --backend cpu

fit_version: 1

panel_manifest: ../panels/rapeseed_horvath2020.yaml

panel:
  name: rapeseed_horvath2020
  subgenomes: [A, C]

phenotype:
  path: data/processed/rapeseed/horvath/pheno_clean.tsv
  sample_col: sample
  trait: plant_height

genotype:
  scan_bed_prefix_template: data/processed/rapeseed/horvath/{subgenome}/all
  grm:
    source: bed                # LOCO requires per-chrom partials (no npz)
    bed_prefix_template: data/processed/rapeseed/horvath/{subgenome}/all
    maf_min: 0.01

kernels:
  normalize: trace
  include_hadamard: false
  hadamard_name: hom

reml:
  n_starts: 10
  seed: 2026

scan:
  mode: auto
  backend: auto
  batch_size: 20000
  maf_min: 0.01
  call_rate_min: 0.9
  loco:
    enabled: true
    fallback: error           # error | emmax (emmax reserved, not implemented)
    min_denominator_fraction: 1.0e-6

plots:
  enabled: true

outputs:
  out_dir: results/phase3/m3_1_loco/horvath2020
  prefix: plant_height
