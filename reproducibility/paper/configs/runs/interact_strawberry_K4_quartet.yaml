# interact_strawberry_K4_quartet.yaml
# Strawberry (Fragaria x ananassa, octoploid 8n) TRUE quartet homoeolog-clique scan.
# Generic mode=homoeolog over n=4 subgenomes (A/B/C/D): every strict 4/4 quartet contributes
# C(4,2)=6 within-group pairwise burden-product interactions + a group-level ACAT omnibus.
# This is the n=4 exercise of the arbitrary-ploidy engine (run_clique_scan); the K4 network
# figure draws each quartet as a 4-vertex graph (square + 2 diagonals).
#
# HONEST BOUNDARY — expected result is G=0 callable quartets: the 48K Axiom array is heavily
# A-subgenome-biased (snp_to_gene: A~6000 genes, but B/C/D only a few hundred each), so no
# quartet has all four homoeologs covered at burden min_snp>=3. This is an array-coverage
# limit, NOT a code/method limit; the shown strawberry interaction figure uses the A/C/D
# triad (G=1, interact_strawberry_meanscore_triad.yaml). Kept here as the reproducible 8n
# quartet entry point and a real-data n=4 smoke of the generic engine.
#
# Prep artifacts (built once; see results/phase7/bio_strawberry/interact_prep/):
#   prep-snps --gff strawberry_genes.gff3 --subgenome-map subgenome_map.tsv \
#             --bed A=.../A/all --bed B=... --bed C=... --bed D=... \
#             --feature gene --id-attr ID --flank-bp 1000 --min-snp 1
#   quartets_ABCD.tsv = quartets.tsv columns A,B,C,D -> gene_A,gene_B,gene_C,gene_D
interact:
  mode: homoeolog
  subgenomes: [A, B, C, D]
  genotype:
    A: data/processed/fragaria_ananassa/A/all
    B: data/processed/fragaria_ananassa/B/all
    C: data/processed/fragaria_ananassa/C/all
    D: data/processed/fragaria_ananassa/D/all
  snp_to_gene:
    A: results/phase7/bio_strawberry/interact_prep/snp_to_gene_A.npz
    B: results/phase7/bio_strawberry/interact_prep/snp_to_gene_B.npz
    C: results/phase7/bio_strawberry/interact_prep/snp_to_gene_C.npz
    D: results/phase7/bio_strawberry/interact_prep/snp_to_gene_D.npz
  groups: results/phase7/bio_strawberry/interact_prep/quartets_ABCD.tsv
  phenotype: data/processed/strawberry/pheno_clean.tsv
  sample_col: sample_id
  trait: mean_score
  burden: {cap: 150, min_snp: 3}
  grm: {method: grm_from_X}
  calibration: {perm_B: 200}
outputs:
  out_dir: results/phase7/interact_strawberry_K4
  full_ranking: true
