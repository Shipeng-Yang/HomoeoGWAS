# fit_peanut_seed_length.yaml
# Peanut (Arachis hypogaea, AABB tetraploid) subgenome-stratified LMM GWAS.
# Panel: PeanutPan 269 pangenome (Lu et al. 2025 Nat Genet); 230 AABB accessions
# with phenotype. Reference NDH108 (Chr01-10 = A, Chr11-20 = B).
# Trait: 100-seed weight (g).

fit_version: 1

panel:
  name: peanut_pangenome269
  subgenomes: [A, B]

phenotype:
  path: data/processed/peanut/pheno_269.tsv
  sample_col: sample
  trait: seed_length

genotype:
  scan_bed_prefix_template: data/processed/arachis_hypogaea/{subgenome}/all
  grm:
    source: bed
    bed_prefix_template: data/processed/arachis_hypogaea/{subgenome}/all
    maf_min: 0.05

kernels:
  normalize: trace
  include_hadamard: false
  hadamard_name: hom

reml:
  n_starts: 10
  seed: 2026

scan:
  mode: auto                  # ~265k(A)+362k(B) SNP at n=230 fits in-memory
  backend: cpu
  batch_size: 20000
  maf_min: 0.05
  call_rate_min: 0.9
  loco:
    enabled: true
    fallback: error
    min_denominator_fraction: 1.0e-6

plots:
  enabled: true

outputs:
  out_dir: results/peanut/seed_length
  prefix: seed_length
