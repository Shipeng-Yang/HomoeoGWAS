site_name: HomoeoGWAS
site_description: Subgenome-aware scalable LMM + DL prior conditional lift for allopolyploid GWAS
site_url: https://u7-gwas.github.io/homoeogwas/
repo_url: https://github.com/U7-GWAS/homoeogwas
repo_name: U7-GWAS/homoeogwas

theme:
  name: material
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
  palette:
    - scheme: default
      primary: green
      accent: deep orange
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: green
      accent: deep orange
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

nav:
  - Home: index.md
  - Getting Started: getting_started.md
  - Algorithm: algorithm.md
  - API Reference: api.md
  - Project Charter: 00_charter.md

docs_dir: docs

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.snippets
  - tables
  - footnotes
  - attr_list
  - md_in_html
  - toc:
      permalink: true

plugins:
  - search

extra:
  generator: false
